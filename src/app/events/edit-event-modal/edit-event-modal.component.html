<div class="modal-backdrop" role="presentation">
  <form class="modal-card" [formGroup]="eventForm" (ngSubmit)="onSubmit()" novalidate>
    <h3>Edit event container</h3>
    <p class="hint">This screen preserves event metadata and lifecycle state only. Launch, close, and composition logic are deferred.</p>

    <div class="field-grid">
      <label class="field-span">
        Event name
        <input type="text" formControlName="eventName" placeholder="Spring Launch" />
        <span class="error" *ngIf="eventForm.controls.eventName.touched && eventForm.controls.eventName.invalid">
          Name is required.
        </span>
        <span class="error" *ngIf="nameError">{{ nameError }}</span>
      </label>

      <label class="field-span">
        Description
        <textarea rows="3" formControlName="eventDescription" placeholder="Optional planning notes for administrators"></textarea>
      </label>

      <label>
        Lifecycle
        <select formControlName="lifecycleStatus">
          <option *ngFor="let option of lifecycleOptions" [value]="option">
            {{ option | titlecase }}
          </option>
        </select>
      </label>

      <label>
        Start date
        <input type="datetime-local" formControlName="startDateUtc" />
      </label>

      <label>
        End date
        <input type="datetime-local" formControlName="endDateUtc" />
      </label>
    </div>

    <span class="error" *ngIf="dateRangeError">{{ dateRangeError }}</span>

    <div class="actions">
      <app-ui-button variant="ghost" (clicked)="onCancel()">Cancel</app-ui-button>
      <app-ui-button buttonType="submit" [disabled]="pending">Save changes</app-ui-button>
    </div>
  </form>
</div>
